<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeAI Pro Editor</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor/min/vs/loader.js"></script>
    <script>
        require.config({ paths: { 'vs': 'https://cdn.jsdelivr.net/npm/monaco-editor/min/vs' } });
        require(['vs/editor/editor.main'], function() {
            monaco.editor.create(document.getElementById('editor'), {
                value: 'function hello() {\n    console.log(\"Hello World\");\n}',
                language: 'javascript'
            });
        });
    </script>
</head>
<body>
    <div id="chatContainer">
        <h2>Chat Functionality</h2>
        <div id="chatBox"></div>
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button id="sendButton">Send</button>
    </div>
    <div id="editorContainer" style="height: 400px; border: 1px solid #ccc;"></div>
    <div id="livePreviewContainer">
        <h2>Live Preview</h2>
        <iframe id="livePreview" style="width: 100%; height: 300px;"></iframe>
    </div>
    <script>
        document.getElementById('sendButton').addEventListener('click', function() {
            const input = document.getElementById('chatInput').value;
            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += '<p>' + input + '</p>';
            document.getElementById('chatInput').value = '';
        });

        const livePreview = document.getElementById('livePreview');
        function updatePreview() {
            const code = monaco.editor.getModels()[0].getValue();
            livePreview.srcdoc = code;
        }
        monaco.editor.getModels()[0].onDidChangeContent(updatePreview);
    </script>
</body>
</html>
